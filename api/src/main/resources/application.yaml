server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: browser-service-api
  threads:
    virtual:
      enabled: true
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/browser_service}
    username: ${DATABASE_USERNAME:browser_service}
    password: ${DATABASE_PASSWORD:browser_service}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

browserservice:
  session:
    idle-ttl-seconds: 300
    absolute-ttl-seconds: 1800
    max-concurrent: 20
    lock-acquire-timeout-ms: 5000
  selenium:
    urls: ${SELENIUM_GRID_URLS:http://localhost:4444/wd/hub}
    connect-timeout-ms: 15000
    read-timeout-ms: 60000
    max-retries: 3
    implicit-wait-enabled: false
    implicit-wait-seconds: 10
  appium:
    urls: ${APPIUM_URLS:}
    platform: ANDROID
    device-name: ""
    connect-timeout-ms: 60000
    max-retries: 3
  browserstack:
    enabled: false
    hub-url: ""
    username: ${BROWSERSTACK_USERNAME:}
    access-key: ${BROWSERSTACK_ACCESS_KEY:}
    real-mobile: true
    local: false
    debug: true
  web-socket:
    path: /v1/ws/sessions
    command-queue-depth: 32
    idle-close-seconds: 300
    outbound-buffer-ki-b: 64
    send-time-limit-ms: 10000
    alert-push-enabled: true
    alert-poll-ms: 250
    console-push-enabled: true
    console-poll-ms: 1000
    navigation-push-enabled: true
    navigation-poll-ms: 2000
    watcher-lock-timeout-ms: 50
    max-binary-frame-bytes: 16777216

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: prometheus
      path-mapping:
        prometheus: metrics
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: browser-service-api

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  paths-to-exclude:
    - /metrics
